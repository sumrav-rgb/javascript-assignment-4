<!DOCTYPE html>
<html>
  <head>
    <title>Odd or Even</title>
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      .even {
        color: green;
      }
      .odd {
        color: red;
      }
    </style>
  </head>
  <body>

    <h1>Odd or Even Numbers (0 to 200)</h1>
    <div id="results"></div>

    <script>
      // Function to check if the number is odd or even
      function checkOddOrEven(number) {
        // Create a new div element to show the result
        let resultText = document.createElement('div');
        
        // Check if the number is even or odd
        if (number % 2 === 0) {
          resultText.textContent = number + " - Even";
          resultText.style.color = 'green'; // Even numbers will be green
        } else {
          resultText.textContent = number + " - Odd";
          resultText.style.color = 'red'; // Odd numbers will be red
        }
        
        // Append the resultText to the results div
        document.getElementById('results').appendChild(resultText);
      }

      // Loop through numbers 0 to 200
      for (let i = 0; i <= 200; i++) {
        // Call the function for each number
        checkOddOrEven(i);
      }
    </script>

  </body>
</html>
